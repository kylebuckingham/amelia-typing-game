<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Amelia's Typing Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #a8e6ff 0%, #d9b3ff 50%, #ffc1e3 100%);
            background-attachment: fixed;
        }
        h1 {
            color: #5b3fa8;
            text-shadow: 2px 2px 0 #fff;
            margin: 24px 0 8px;
            text-align: center;
        }
        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 24px;
            padding: 20px;
        }
        #startButton {
            font-size: 32px;
            font-family: inherit;
            padding: 20px 48px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: #ffb703;
            color: #5b3fa8;
            box-shadow: 0 6px 0 #e09d00;
            transition: transform 0.1s;
        }
        #startButton:active { transform: translateY(4px); box-shadow: 0 2px 0 #e09d00; }
        #keyBox {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 16px 20px;
            max-width: 420px;
            text-align: center;
            color: #5b3fa8;
            font-size: 15px;
        }
        #apiKeyInput {
            width: 100%;
            font-size: 16px;
            padding: 10px;
            margin-top: 8px;
            border: 2px solid #d9b3ff;
            border-radius: 10px;
            outline: none;
        }
        #gameContainer {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 0 16px 90px; /* room for the fixed time bar */
        }
        #topBar {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
        }
        .stat {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 10px 18px;
            font-size: 20px;
            color: #5b3fa8;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        .stat span { font-weight: bold; }
        #muteButton {
            padding: 10px 20px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
            color: #5b3fa8;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        #mainArea {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }
        #playCard {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            padding: 24px 28px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            flex: 1 1 560px;
            max-width: 720px;
        }
        .word {
            font-size: clamp(48px, 10vw, 88px);
            letter-spacing: 6px;
            color: #333;
            margin: 4px 0 16px;
            transition: color 0.4s, transform 0.2s;
            min-height: 70px;
            overflow-wrap: anywhere;
        }
        .word.correct { color: #2bb24c; transform: scale(1.08); }
        .word.wrong { color: #e63946; }
        #inputRow {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }
        #inputWord {
            font-size: 32px;
            font-family: inherit;
            text-align: center;
            text-transform: uppercase;
            flex: 1 1 280px;
            max-width: 420px;
            padding: 12px;
            border: 3px solid #d9b3ff;
            border-radius: 16px;
            outline: none;
        }
        #inputWord:focus { border-color: #5b3fa8; }
        #checkButton {
            font-size: 24px;
            font-family: inherit;
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            border-radius: 16px;
            background: #5b3fa8;
            color: white;
        }
        #checkButton:active { background: #44307e; }
        #imageContainer {
            margin: 20px auto 8px;
            width: min(560px, 88vw);
            height: min(560px, 88vw);
            border-radius: 20px;
            background: #f3eefc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #generatedImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #loadingIcon {
            font-size: 56px;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #definition {
            font-size: 19px;
            color: #555;
            min-height: 48px;
            margin: 12px auto 0;
            max-width: 560px;
        }
        #speakButton {
            margin-top: 8px;
            padding: 12px 20px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border: 2px solid #d9b3ff;
            border-radius: 12px;
            background: white;
            color: #5b3fa8;
        }
        #awards {
            font-size: 26px;
            color: #5b3fa8;
            min-height: 36px;
            margin-top: 12px;
        }
        #creatureShelf {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            font-size: 38px;
            min-height: 48px;
            margin-top: 8px;
        }
        #creatureShelf span {
            animation: pop 0.4s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        #timeBar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 18px;
            color: #5b3fa8;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
            white-space: nowrap;
            display: none;
        }
        #timeBar span { font-weight: bold; }
        #sidePanel {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            padding: 20px;
            flex: 0 1 260px;
            max-height: 640px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        #sidePanel h3 { margin: 0 0 10px; color: #5b3fa8; }
        #wordList div {
            font-size: 17px;
            padding: 4px 0;
            border-bottom: 1px dashed #e6dcf7;
        }
        #wordList .correct { color: #2bb24c; }
        #wordList .wrong { color: #e63946; }
    </style>
</head>
<body>
    <h1>⌨️ Amelia's Typing Game</h1>

    <div id="startScreen">
        <button id="startButton">▶ Start Game</button>
        <div id="keyBox">
            🔑 OpenAI API key (optional — gives the nicest voice; without it the iPad's built-in voice is used)
            <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
        </div>
    </div>

    <div id="gameContainer">
        <div id="topBar">
            <div class="stat">🦄 Creatures: <span id="score">0</span></div>
            <div class="stat">🔥 Streak: <span id="streak">0</span></div>
            <div class="stat">🏅 Best: <span id="bestStreak">0</span></div>
            <button id="muteButton">🔊 Sound On</button>
        </div>

        <div id="mainArea">
            <div id="playCard">
                <div id="displayWord" class="word"></div>
                <div id="inputRow">
                    <input type="text" id="inputWord" autocomplete="off" autocorrect="off"
                           autocapitalize="characters" spellcheck="false" enterkeyhint="done"
                           placeholder="Type the word!">
                    <button id="checkButton">✓ Check</button>
                </div>
                <div id="imageContainer">
                    <img id="generatedImage" src="" alt="Picture of the word">
                    <div id="loadingIcon">🎨</div>
                </div>
                <div id="definition"></div>
                <button id="speakButton">🔈 Hear it again</button>
                <div id="awards"></div>
                <div id="creatureShelf"></div>
            </div>
            <div id="sidePanel">
                <h3>Your Words</h3>
                <div id="wordList"></div>
            </div>
        </div>
    </div>

    <div id="timeBar">⏱️ Last: <span id="lastTime">–</span> &nbsp;·&nbsp; Fastest: <span id="bestTime">–</span> &nbsp;·&nbsp; Average: <span id="avgTime">–</span></div>

    <script>
        let currentWord = '';
        let currentDefinition = '';
        let startTime;
        let audioEnabled = true;
        let correctStreak = 0;
        let bestStreak = 0;
        let score = 0;
        let openaiKey = localStorage.getItem('ameliaOpenAIKey') || '';

        const displayWord = document.getElementById('displayWord');
        const inputWord = document.getElementById('inputWord');
        const awards = document.getElementById('awards');
        const startButton = document.getElementById('startButton');
        const startScreen = document.getElementById('startScreen');
        const gameContainer = document.getElementById('gameContainer');
        const generatedImage = document.getElementById('generatedImage');
        const loadingIcon = document.getElementById('loadingIcon');
        const wordList = document.getElementById('wordList');
        const definitionEl = document.getElementById('definition');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const bestStreakEl = document.getElementById('bestStreak');
        const muteButton = document.getElementById('muteButton');
        const speakButton = document.getElementById('speakButton');
        const checkButton = document.getElementById('checkButton');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const creatureShelf = document.getElementById('creatureShelf');
        const timeBar = document.getElementById('timeBar');
        const lastTimeEl = document.getElementById('lastTime');
        const bestTimeEl = document.getElementById('bestTime');
        const avgTimeEl = document.getElementById('avgTime');
        apiKeyInput.value = openaiKey;

        // ============ MYSTICAL CREATURE POINTS ============
        const CREATURES = [
            { emoji: '🦄', name: 'unicorn' },
            { emoji: '🐉', name: 'dragon' },
            { emoji: '🐲', name: 'baby dragon' },
            { emoji: '🧜‍♀️', name: 'mermaid' },
            { emoji: '🧜‍♂️', name: 'merman' },
            { emoji: '🧚', name: 'fairy' },
            { emoji: '🧚‍♂️', name: 'pixie' },
            { emoji: '🧞', name: 'genie' },
            { emoji: '🐦‍🔥', name: 'phoenix' },
            { emoji: '🧌', name: 'troll' },
            { emoji: '👻', name: 'friendly ghost' },
            { emoji: '🦕', name: 'lake monster' },
            { emoji: '🐺', name: 'moon wolf' },
            { emoji: '🦉', name: 'wizard owl' },
            { emoji: '🐈‍⬛', name: 'magic cat' },
            { emoji: '🦢', name: 'enchanted swan' },
            { emoji: '🦊', name: 'nine-tailed fox' },
            { emoji: '🐍', name: 'basilisk' },
            { emoji: '🦋', name: 'dream butterfly' },
            { emoji: '🐢', name: 'world turtle' },
            { emoji: '🦌', name: 'golden stag' },
            { emoji: '🐙', name: 'kraken' },
            { emoji: '🦁', name: 'griffin' },
            { emoji: '🐸', name: 'frog prince' },
            { emoji: '🦚', name: 'firebird' },
            { emoji: '🐴', name: 'pegasus' }
        ];
        function awardCreature() {
            const creature = CREATURES[Math.floor(Math.random() * CREATURES.length)];
            const span = document.createElement('span');
            span.textContent = creature.emoji;
            span.title = creature.name;
            creatureShelf.appendChild(span);
            return creature;
        }

        // ============ ANSWER TIME SCORE ============
        const correctTimes = [];
        function recordTime(seconds, wasCorrect) {
            timeBar.style.display = 'block';
            lastTimeEl.textContent = `${seconds.toFixed(2)}s`;
            if (wasCorrect) {
                correctTimes.push(seconds);
                bestTimeEl.textContent = `${Math.min(...correctTimes).toFixed(2)}s`;
                const avg = correctTimes.reduce((a, b) => a + b, 0) / correctTimes.length;
                avgTimeEl.textContent = `${avg.toFixed(2)}s`;
            }
        }

        // ============ RANDOM WORDS (Datamuse API — free, no key) ============
        // Pull common words starting with a random letter, keep 4+ letter
        // everyday words (frequency >= 4 per million), queue them up with
        // their dictionary definitions so the next word is always ready.
        const usedWords = new Set();
        let readyQueue = [];        // [{word, definition, imagePromise}]
        let fillPromise = null;     // in-flight fill, so concurrent callers await the same work

        // elementary school science vocabulary, 4–7 letters
        const SCIENCE_WORDS = [
            'atom', 'cell', 'energy', 'force', 'motion', 'speed', 'matter', 'liquid',
            'solid', 'vapor', 'steam', 'freeze', 'melt', 'boil', 'heat', 'light',
            'sound', 'prism', 'lens', 'mirror', 'shadow', 'rainbow', 'gravity', 'magnet',
            'compass', 'circuit', 'battery', 'spark', 'metal', 'carbon', 'oxygen', 'helium',
            'planet', 'orbit', 'solar', 'lunar', 'comet', 'meteor', 'crater', 'galaxy',
            'nebula', 'eclipse', 'rocket', 'star', 'moon', 'earth', 'ocean', 'river',
            'lake', 'tide', 'wave', 'cloud', 'storm', 'rain', 'snow', 'frost',
            'climate', 'weather', 'season', 'desert', 'forest', 'jungle', 'tundra', 'glacier',
            'volcano', 'lava', 'magma', 'mineral', 'crystal', 'fossil', 'quartz', 'soil',
            'sand', 'rock', 'seed', 'root', 'stem', 'leaf', 'petal', 'pollen',
            'flower', 'nectar', 'fungus', 'algae', 'moss', 'fern', 'insect', 'larva',
            'beetle', 'spider', 'mammal', 'reptile', 'lizard', 'turtle', 'snake', 'shark',
            'whale', 'dolphin', 'coral', 'salmon', 'eagle', 'falcon', 'brain', 'heart',
            'lungs', 'muscle', 'bone', 'skull', 'spine', 'nerve', 'blood', 'virus',
            'microbe', 'habitat', 'species', 'neuron', 'proton', 'neutron', 'density', 'volume',
            'mass', 'weight', 'acid', 'prey'
        ].map(w => w.toUpperCase());

        function getRandomCandidate() {
            let unused = SCIENCE_WORDS.filter(w => !usedWords.has(w));
            if (unused.length === 0) {
                usedWords.clear(); // she's done them all — start the list over
                unused = SCIENCE_WORDS;
            }
            return unused[Math.floor(Math.random() * unused.length)];
        }

        async function getDefinition(word) {
            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                if (!res.ok) return null;
                const data = await res.json();
                return data[0]?.meanings?.[0]?.definitions?.[0]?.definition || null;
            } catch (e) {
                return null;
            }
        }

        // With an OpenAI key, rewrite the stiff dictionary definition into a
        // short, kid-friendly description. Falls back to the dictionary one.
        async function kidFriendlyDefinition(word, fallback) {
            if (!openaiKey) return fallback;
            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openaiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [{
                            role: 'user',
                            content: `Explain the science meaning of the word "${word.toLowerCase()}" to an elementary school student in one short, simple, friendly sentence. Do not use the word "${word.toLowerCase()}" or any form of it in the explanation. Reply with only the sentence.`
                        }],
                        max_tokens: 60,
                        temperature: 0.7
                    })
                });
                if (!res.ok) throw new Error(`definition failed: ${res.status}`);
                const data = await res.json();
                return data.choices?.[0]?.message?.content?.trim() || fallback;
            } catch (e) {
                console.warn('AI definition unavailable, using dictionary', e);
                return fallback;
            }
        }

        function fillQueue() {
            if (!fillPromise) {
                fillPromise = (async () => {
                    try {
                        while (readyQueue.length < 3) {
                            const word = getRandomCandidate();
                            usedWords.add(word);
                            const dictDefinition = await getDefinition(word);
                            const definition = await kidFriendlyDefinition(word, dictDefinition || '');
                            if (definition) {
                                // start generating the picture now so it's ready when the word comes up
                                readyQueue.push({ word, definition, imagePromise: makeImage(word, definition) });
                            }
                        }
                    } catch (e) {
                        console.warn('word fetch failed, will retry', e);
                    } finally {
                        fillPromise = null;
                    }
                })();
            }
            return fillPromise;
        }

        // ============ SOUND EFFECTS (Web Audio — works on iPad once unlocked) ============
        let audioCtx;
        function ensureAudioCtx() {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, duration, type, delay) {
            if (!audioEnabled) return;
            const ctx = ensureAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.25, ctx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
            osc.connect(gain).connect(ctx.destination);
            osc.start(ctx.currentTime + delay);
            osc.stop(ctx.currentTime + delay + duration);
        }
        function playCorrectSound() {
            playTone(523, 0.15, 'sine', 0);
            playTone(659, 0.15, 'sine', 0.12);
            playTone(784, 0.25, 'sine', 0.24);
        }
        function playWrongSound() {
            playTone(180, 0.35, 'sawtooth', 0);
        }

        // ============ SPEECH ============
        // Best quality: OpenAI's gpt-4o-mini-tts voice API, played through Web
        // Audio (reliable on iPad after the start-button tap unlocks audio).
        // Falls back to the browser's built-in voice if no key or on error.
        let ttsSource = null;
        let speakRequestId = 0;

        function stopSpeaking() {
            speakRequestId++;
            if (ttsSource) { try { ttsSource.stop(); } catch (e) {} ttsSource = null; }
            if ('speechSynthesis' in window) speechSynthesis.cancel();
        }

        async function speakOpenAI(text, requestId) {
            const res = await fetch('https://api.openai.com/v1/audio/speech', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${openaiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini-tts',
                    voice: 'coral',
                    input: text,
                    instructions: 'Speak warmly, slowly and very clearly, like a friendly teacher reading to a young child.',
                    response_format: 'mp3'
                })
            });
            if (!res.ok) throw new Error(`TTS failed: ${res.status}`);
            const buf = await res.arrayBuffer();
            const ctx = ensureAudioCtx();
            const audioBuf = await ctx.decodeAudioData(buf);
            if (requestId !== speakRequestId) return; // a newer word started speaking
            ttsSource = ctx.createBufferSource();
            ttsSource.buffer = audioBuf;
            ttsSource.connect(ctx.destination);
            ttsSource.start();
        }

        function speakBrowser(text) {
            if (!('speechSynthesis' in window)) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            speechSynthesis.speak(utterance);
        }

        async function speak(text) {
            stopSpeaking();
            const requestId = speakRequestId;
            if (openaiKey) {
                try {
                    await speakOpenAI(text, requestId);
                    return;
                } catch (e) {
                    console.warn('OpenAI voice unavailable, using built-in voice', e);
                }
            }
            if (requestId === speakRequestId) speakBrowser(text);
        }

        function speakCurrentWord() {
            speak(`${currentWord}. ${currentDefinition}`);
        }

        // ============ IMAGES ============
        // With an OpenAI key: generate an illustration from the word AND its
        // description (gpt-image-1, falling back to dall-e-3 for accounts
        // without gpt-image-1 access). Without a key: keyword photos from
        // loremflickr.com (free).
        const IMAGE_STYLES = [
            'colorful kids science textbook illustration',
            'vintage encyclopedia plate',
            'watercolor nature field guide illustration',
            'museum exhibit poster',
            'cutaway cross-section diagram',
            'isometric 3D educational render',
            'detailed scientific botanical-style drawing',
            'stunning nature documentary photograph',
            'macro photograph showing tiny details up close',
            'space telescope photography style',
            'hand-drawn science notebook sketch with arrows',
            'chalkboard science diagram',
            'paper diorama classroom model photograph',
            'kids science magazine cover illustration',
            'realistic 3D render',
            'colorful infographic-style illustration'
        ];

        async function generateOpenAIImage(model, prompt) {
            const body = {
                model,
                prompt,
                size: '1024x1024',
                n: 1
            };
            if (model === 'gpt-image-1') {
                body.quality = 'high'; // OpenAI's best image model at its best quality
            } else {
                body.quality = 'hd';
                body.response_format = 'b64_json';
            }
            const res = await fetch('https://api.openai.com/v1/images/generations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${openaiKey}`
                },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`image generation failed: ${res.status}`);
            const data = await res.json();
            const result = data.data[0];
            return result.b64_json ? `data:image/png;base64,${result.b64_json}` : result.url;
        }

        function loremFlickrUrl(word) {
            return `https://loremflickr.com/640/640/${encodeURIComponent(word.toLowerCase())}?t=${Date.now()}`;
        }

        async function makeImage(word, definition) {
            if (openaiKey) {
                const style = IMAGE_STYLES[Math.floor(Math.random() * IMAGE_STYLES.length)];
                const prompt = `A ${style} that clearly teaches the meaning of the science word "${word.toLowerCase()}", which means: ${definition}. Scientifically accurate, clear and visually engaging for an elementary school student — informative first, with a touch of charm. No text, letters, labels or words in the image.`;
                try { return await generateOpenAIImage('gpt-image-1', prompt); }
                catch (e) { console.warn('gpt-image-1 unavailable, trying dall-e-3', e); }
                try { return await generateOpenAIImage('dall-e-3', prompt); }
                catch (e) { console.warn('dall-e-3 unavailable, using photo fallback', e); }
            }
            return loremFlickrUrl(word);
        }

        async function displayImage(word, imagePromise) {
            generatedImage.style.display = 'none';
            loadingIcon.style.display = 'block';
            const url = await imagePromise;
            if (currentWord !== word) return; // a newer word already replaced this one
            const img = new Image();
            img.onload = () => {
                if (currentWord !== word) return;
                generatedImage.src = url;
                generatedImage.style.display = 'block';
                loadingIcon.style.display = 'none';
            };
            img.onerror = () => {
                if (currentWord !== word) return;
                loadingIcon.style.display = 'none';
            };
            img.src = url;
        }

        // ============ GAME FLOW ============
        async function nextWord() {
            while (readyQueue.length === 0) {
                displayWord.textContent = '…';
                definitionEl.textContent = 'Finding a word…';
                await fillQueue();
                if (readyQueue.length === 0) {
                    // fetch failed (e.g. brief network hiccup) — pause, then retry
                    await new Promise(resolve => setTimeout(resolve, 800));
                }
            }
            const next = readyQueue.shift();
            fillQueue(); // top the queue back up in the background
            currentWord = next.word;
            currentDefinition = next.definition;
            displayWord.textContent = currentWord;
            definitionEl.textContent = `📖 ${currentDefinition}`;
            inputWord.value = '';
            displayImage(currentWord, next.imagePromise);
            if (audioEnabled) speakCurrentWord();
            startTime = Date.now();
        }

        function updateAwards(streak, creature) {
            if (streak >= 10) {
                awards.textContent = '🏆 Gold Award!';
            } else if (streak >= 5) {
                awards.textContent = '🥈 Silver Award!';
            } else if (streak >= 3) {
                awards.textContent = '🥉 Bronze Award!';
            } else if (creature) {
                awards.textContent = `🎉 You caught a ${creature.name}! ${creature.emoji}`;
            } else {
                awards.textContent = '';
            }
        }

        function updateStats() {
            scoreEl.textContent = score;
            streakEl.textContent = correctStreak;
            bestStreakEl.textContent = bestStreak;
        }

        function checkAnswer() {
            if (!inputWord.value.trim()) return;
            const typedWord = inputWord.value.trim().toUpperCase();
            const seconds = (Date.now() - startTime) / 1000;
            const timeTaken = seconds.toFixed(2);
            let creature = null;

            if (typedWord === currentWord) {
                score++;
                correctStreak++;
                bestStreak = Math.max(bestStreak, correctStreak);
                creature = awardCreature();
                displayWord.classList.add('correct');
                setTimeout(() => displayWord.classList.remove('correct'), 500);
                wordList.innerHTML = `<div class="correct">✅ ${typedWord} ${creature.emoji} — ${timeTaken}s</div>` + wordList.innerHTML;
                playCorrectSound();
                confetti({ particleCount: 80, spread: 70, origin: { y: 0.7 } });
            } else {
                correctStreak = 0;
                displayWord.classList.add('wrong');
                setTimeout(() => displayWord.classList.remove('wrong'), 500);
                wordList.innerHTML = `<div class="wrong">❌ ${typedWord} — ${timeTaken}s</div>` + wordList.innerHTML;
                playWrongSound();
            }
            recordTime(seconds, typedWord === currentWord);
            updateAwards(correctStreak, creature);
            updateStats();
            nextWord();
            inputWord.focus();
        }

        startButton.addEventListener('click', () => {
            const newKey = apiKeyInput.value.trim();
            if (newKey !== openaiKey) {
                openaiKey = newKey;
                // words queued before the key changed have the wrong style of
                // description and image — drop them and refill with the new key
                readyQueue.length = 0;
            }
            localStorage.setItem('ameliaOpenAIKey', openaiKey);
            // unlock audio on iPad: must happen inside a user tap
            ensureAudioCtx();
            if ('speechSynthesis' in window) {
                const primer = new SpeechSynthesisUtterance('');
                speechSynthesis.speak(primer);
            }
            gameContainer.style.display = 'block';
            startScreen.style.display = 'none';
            nextWord();
            inputWord.focus();
        });

        muteButton.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            muteButton.textContent = audioEnabled ? '🔊 Sound On' : '🔇 Muted';
            if (!audioEnabled) stopSpeaking();
        });

        speakButton.addEventListener('click', () => {
            ensureAudioCtx();
            speakCurrentWord(); // explicit request — works even when muted
        });

        checkButton.addEventListener('click', checkAnswer);
        inputWord.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') checkAnswer();
        });

        // start pre-loading words right away so the game starts instantly
        fillQueue();
    </script>
</body>
</html>
